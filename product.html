<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product — Inny Scents Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .gold { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .border-gold { border-color: #d4af37; }
        .btn-gold { background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 0.5rem 1.5rem; transition: 0.3s; }
        .btn-gold:hover { background: #d4af37; color: #0a0a0a; }
        .gold-line { width: 60px; height: 2px; background: #d4af37; margin: 1rem 0; }
        .hover-gold:hover { color: #d4af37; }
        .size-option { border: 1px solid #333; padding: 0.5rem 1rem; cursor: pointer; }
        .size-option.selected { border-color: #d4af37; background-color: #d4af37; color: black; }
    </style>
</head>
<body>
    <!-- Header (same) -->
    <header class="border-b border-gray-800 py-5 px-6 md:px-12 bg-[#0a0a0a] relative">
        <div class="flex justify-between items-center">
            <div class="text-2xl serif font-bold tracking-wide">
                <span class="text-white">INNY SCENTS</span> <span class="gold">ATELIER</span>
            </div>
            <nav class="hidden md:flex space-x-8 text-sm uppercase tracking-wider items-center">
                <a href="index.html" class="hover-gold">Home</a>
                <a href="shop.html" class="hover-gold">Shop</a>
                <a href="about.html" class="hover-gold">About</a>
                <a href="contact.html" class="hover-gold">Contact</a>
                <a href="cart.html" class="relative hover-gold">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="cart-count" class="absolute -top-2 -right-3 bg-gold text-black text-xs rounded-full w-4 h-4 flex items-center justify-center">0</span>
                </a>
                <div id="auth-links-desktop" class="flex items-center space-x-4"></div>
            </nav>
            <div class="flex items-center space-x-4 md:hidden">
                <a href="cart.html" class="relative hover-gold">
                    <i class="fas fa-shopping-bag text-xl"></i>
                    <span id="cart-count-mobile" class="absolute -top-2 -right-3 bg-gold text-black text-xs rounded-full w-4 h-4 flex items-center justify-center">0</span>
                </a>
                <button id="menu-toggle" class="text-2xl focus:outline-none">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden mt-4 pb-4 space-y-3 text-center border-t border-gray-800 pt-4">
            <a href="index.html" class="block hover-gold">Home</a>
            <a href="shop.html" class="block hover-gold">Shop</a>
            <a href="about.html" class="block hover-gold">About</a>
            <a href="contact.html" class="block hover-gold">Contact</a>
            <div id="auth-links-mobile" class="flex flex-col space-y-2 pt-2"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-16">
        <div id="product-detail" class="grid md:grid-cols-2 gap-12"></div>
    </main>

    <footer class="border-t border-gray-800 py-10 px-6 text-sm text-gray-400">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div>© 2025 INNY SCENTS ATELIER — all rights reserved</div>
            <div class="flex space-x-6 mt-4 md:mt-0">
                <a href="#" class="hover-gold text-xl"><i class="fab fa-instagram"></i></a>
                <a href="#" class="hover-gold text-xl"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="hover-gold text-xl"><i class="far fa-envelope"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // Product database
        const products = [
            { id: 1, name: "Bad and Boujee", category: "men", type: "sweet / attractive", price: 6500, img: "/img/Bad and boujee.jpeg", top: "Bergamot, Saffron", heart: "Oud, Rose", base: "Leather, Amber", longevity: "10+ hours", mood: "Bold. Mysterious. Confident." },
            { id: 2, name: "Kaly", category: "women", type: "Floral / Romantic", price: 12000, img: "/img/Kaly.jpeg", top: "Lychee, Pink Pepper", heart: "Damask Rose, Jasmine", base: "Vanilla, Musk", longevity: "8 hours", mood: "Romantic. Elegant. Soft." },
            { id: 3, name: "Riggs", category: "unisex", type: "Fresh / Unisex", price: 3500, img: "/img/riggs.jpeg", top: "Grapefruit, Lemon", heart: "Neroli, Petitgrain", base: "Musk, Cedar", longevity: "6 hours", mood: "Energetic. Fresh. Uplifting." },
            { id: 4, name: "Bleu de chanel", category: "men", type: "Leather / Spicy", price: 20000, img: "https://images.unsplash.com/photo-1523293182086-7651a899d37f?q=80&w=1770&auto=format&fit=crop", top: "Cardamom, Cumin", heart: "Leather, Tobacco", base: "Amber, Patchouli", longevity: "12 hours", mood: "Powerful. Sensual. Warm." },
            { id: 5, name: "Elixir", category: "unisex", type: "irresistible / Special", price: 4500, img: "/img/rexlier perfume.jpeg", top: "jasmine, Cumin", heart: "rose, Tobacco", base: "Amber, Patchouli", longevity: "24+ hours", mood: "Dates. Sensual. classy events." },
            { id: 6, name: "6", category: "men", type: "elegant / Romantic", price: 8000, img: "/img/six.jpeg", top: "Cardamom, Cumin", heart: "Leather, herbal", base: "Amber, Patchouli", longevity: "24+ hours", mood: "youthful Sensual. soft." },
            { id: 7, name: "ophylia", category: "woman", type: "Sexy / Soft", price: 15000, img: "/img/ophylia.jpeg", top: "Bergamot, Saffron", heart: "Oud, Rose", base: "Leather, Amber", longevity: "10+ hours", mood: "Bold. Mysterious. Confident." },
            { id: 8, name: "24k", category: "unisex", type: "confident / calm", price: 7000, img: "/img/24k.jpeg", top: "Cardamom, Cumin", heart: "Leather, herbal", base: "Amber, Patchouli", longevity: "24+ hours", mood: "youthful Sensual. soft." }
        ];

        // Get product id from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id')) || 1;
        const product = products.find(p => p.id === productId) || products[0];

        // Render product page
        const container = document.getElementById('product-detail');
        container.innerHTML = `
            <div>
                <img src="${product.img}" class="w-full h-auto object-cover" alt="${product.name}">
            </div>
            <div>
                <h1 class="text-4xl serif">${product.name}</h1>
                <p class="gold text-lg mt-2">${product.type}</p>
                <p class="text-3xl mt-4">₦${product.price}</p>
                <div class="gold-line my-6"></div>
                <p class="text-xl gold">“${product.mood}”</p>
                
                <div class="mt-6 space-y-4">
                    <div><span class="gold">Top notes:</span> ${product.top}</div>
                    <div><span class="gold">Heart notes:</span> ${product.heart}</div>
                    <div><span class="gold">Base notes:</span> ${product.base}</div>
                    <div><span class="gold">Longevity:</span> ${product.longevity}</div>
                </div>

                <div class="mt-8">
                    <p class="gold mb-2">Size</p>
                    <div class="flex gap-4">
                        <div class="size-option selected" data-size="50ml">50ml</div>
                        <div class="size-option" data-size="100ml">100ml (+₦3000)</div>
                    </div>
                </div>

                <div class="mt-10 flex gap-4">
                    <button id="addToCartBtn" class="btn-gold px-6 py-3 text-lg">Add to Cart</button>
                    <a href="cart.html" class="border border-gray-600 px-6 py-3 text-lg hover:border-gold transition">View Cart</a>
                </div>
            </div>
        `;

        // Size selection
        document.querySelectorAll('.size-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.size-option').forEach(o => o.classList.remove('selected', 'bg-gold', 'text-black', 'border-gold'));
                this.classList.add('selected', 'bg-gold', 'text-black', 'border-gold');
            });
        });

        // Add to cart
        document.getElementById('addToCartBtn').addEventListener('click', () => {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const selectedSize = document.querySelector('.size-option.selected')?.dataset.size || '50ml';
            const price = product.price + (selectedSize === '100ml' ? 30 : 0);
            cart.push({
                id: product.id,
                name: product.name,
                size: selectedSize,
                price: price,
                img: product.img
            });
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Added to cart!');
            updateCartCount();
        });

        // ========== AUTH PROTECTION ==========
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                window.location.href = 'login.html';
            }
        }
        checkAuth();

        // ========== CART COUNT ==========
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count') && (document.getElementById('cart-count').innerText = cart.length);
            document.getElementById('cart-count-mobile') && (document.getElementById('cart-count-mobile').innerText = cart.length);
        }

        // ========== AUTH UI ==========
        function updateAuthUI() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const desktopContainer = document.getElementById('auth-links-desktop');
            const mobileContainer = document.getElementById('auth-links-mobile');
            if (!desktopContainer || !mobileContainer) return;

            if (user) {
                desktopContainer.innerHTML = `
                    <span class="text-gold">Hi, ${user.name}</span>
                    <a href="#" id="logout-link-desktop" class="hover-gold">Logout</a>
                `;
                mobileContainer.innerHTML = `
                    <span class="text-gold block">Hi, ${user.name}</span>
                    <a href="#" id="logout-link-mobile" class="block hover-gold">Logout</a>
                `;
                document.getElementById('logout-link-desktop')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('currentUser');
                    updateAuthUI();
                    window.location.href = 'index.html';
                });
                document.getElementById('logout-link-mobile')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.removeItem('currentUser');
                    updateAuthUI();
                    window.location.href = 'index.html';
                });
            } else {
                desktopContainer.innerHTML = `<a href="login.html" class="hover-gold">Login</a><a href="signup.html" class="hover-gold">Sign Up</a>`;
                mobileContainer.innerHTML = `<a href="login.html" class="block hover-gold">Login</a><a href="signup.html" class="block hover-gold">Sign Up</a>`;
            }
        }

        // ========== MOBILE MENU TOGGLE ==========
        document.getElementById('menu-toggle')?.addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });

        // Initial calls
        updateCartCount();
        updateAuthUI();

        window.addEventListener('storage', function(e) {
            if (e.key === 'cart') updateCartCount();
            if (e.key === 'currentUser') {
                updateAuthUI();
                if (!localStorage.getItem('currentUser')) {
                    window.location.href = 'login.html';
                }
            }
        });
    </script>
</body>
</html>
